name: web

on:
  push:
    branches: [main]
    paths: [web/**, .github/workflows/web.yml]
  pull_request:
    paths: [web/**, .github/workflows/web.yml]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm test
